<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fashion Hub</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
    }

    header {
        background: #ff4d6d;
        color: white;
        padding: 15px;
        text-align: center;
    }

    nav {
        background: #333;
        padding: 10px;
        text-align: center;
    }

    nav a {
        color: white;
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
    }

    nav a:hover {
        color: #ff4d6d;
    }

    .hero {
        background: url('https://images.unsplash.com/photo-1521336575822-6da63fb45455') no-repeat center/cover;
        height: 300px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 30px;
        font-weight: bold;
    }

    .container {
        padding: 20px;
    }

    .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        text-align: center;
    }

    .card img {
        width: 100%;
        border-radius: 10px;
    }

    .card h3 {
        margin: 10px 0;
    }

    .price {
        color: #ff4d6d;
        font-weight: bold;
    }

    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 15px;
        background: #ff4d6d;
        color: white;
        border-radius: 5px;
        text-decoration: none;
    }

    .btn:hover {
        background: #e6004c;
    }

    footer {
        background: #333;
        color: white;
        text-align: center;
        padding: 10px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<header>
    <h1>Fashion Hub</h1>
    <p>Trendy Dresses for Every Occasion</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    New Collection 2026
</div>

<div class="container">
    <h2>Our Dresses</h2>

    <div class="products">
        
        <div class="card">
            <img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a7e" alt="Dress">
            <h3>Floral Summer Dress</h3>
            <p class="price">₹999</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1520975922284-9e0fcd0c5a64" alt="Dress">
            <h3>Elegant Evening Gown</h3>
            <p class="price">₹1999</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="Dress">
            <h3>Casual Midi Dress</h3>
            <p class="price">₹799</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1509631179647-0177331693ae" alt="Dress">
            <h3>Party Wear Dress</h3>
            <p class="price">₹1499</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Fashion Hub | All Rights Reserved</p>
</footer>

</body>
</html>
